  # ============================================================

  - id: "STAMP_001"
    module: "Stamp"
    severity: "Medium"
    evaluator: "missing_evidence"
    description: "Missing e-stamp certificate or challan where required (sale/mortgage)"
    inputs:
      doc_types: ["estamp_certificate", "stamp_challan", "stamp_receipt"]
    logic:
      required_doc_types: ["estamp_certificate", "stamp_challan", "stamp_receipt"]
    outputs:
