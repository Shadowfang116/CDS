# Phase 6: CI pipeline — lint, typecheck, build, Docker build, API smoke
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: "frontend/.nvmrc"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Typecheck
        run: npm run typecheck
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/Dockerfile
          push: false
          load: true
          tags: api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          load: true
          tags: frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  smoke:
    name: API smoke
    runs-on: ubuntu-latest
    needs: [docker-build]
    steps:
      - uses: actions/checkout@v4

      - name: Create .env for CI
        run: |
          echo "POSTGRES_USER=bank_diligence" >> .env
          echo "POSTGRES_PASSWORD=ci_secret" >> .env
          echo "POSTGRES_DB=bank_diligence" >> .env
          echo "APP_SECRET_KEY=ci-secret-key" >> .env

      - name: Build and start services
        run: docker compose up -d api db redis minio

      - name: Run API smoke script
        run: bash scripts/ci/api_smoke.sh

      - name: Show API logs on failure
        if: failure()
        run: docker compose logs api

      - name: Tear down
        if: always()
        run: docker compose down -v
