      evidence_required: "estamp_certificate OR stamp_challan OR stamp_receipt"
      resolution_conditions: "Upload e-stamp evidence and verify payment"

  - id: "STAMP_002"
    module: "Stamp"
    severity: "Medium"
    evaluator: "mismatch"
    description: "Consideration amount vs stamp basis mismatch (>15% threshold)"
    inputs:
      dossier_keys: ["transaction.consideration_amount", "stamp.stamp_basis_amount"]
    logic:
      compare_fields: ["transaction.consideration_amount", "stamp.stamp_basis_amount"]
      threshold_percent: 15
    outputs:
      title: "Stamp Duty Basis Mismatch"
      exception: "Extracted consideration amount differs from stamp basis amount by >15%"
      cp: "Obtain DC valuation basis note + paid stamp proof explaining difference"
      evidence_required: "DC_valuation_basis_note + paid_stamp_proof"
      resolution_conditions: "Upload valuation basis and stamp payment evidence explaining discrepancy"

