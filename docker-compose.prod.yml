# Production compose: no dev mounts, healthchecks, non-root images, env-driven config.
# Usage: docker compose -f docker-compose.prod.yml up -d --build
# Requires .env with strong secrets (POSTGRES_PASSWORD, APP_SECRET_KEY, MINIO_ROOT_*).

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bank_diligence}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-bank_diligence}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bank_diligence} -d ${POSTGRES_DB:-bank_diligence}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app

  minio:
    # Pin tag for reproducibility. Note: recent MinIO images may omit curl; if healthcheck fails, override with a custom check or use an image that includes curl.
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || wget -q -O /dev/null http://localhost:9000/minio/health/live || exit 1"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - app

  migrate:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: bank-diligence-api:prod
    env_file: .env
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-bank_diligence}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-bank_diligence}
    command: ["/bin/bash", "/app/backend_scripts/run_migrations.sh"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app
    restart: "no"

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: bank-diligence-api:prod
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-bank_diligence}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-bank_diligence}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio}
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_EXTERNAL_ENDPOINT: ${MINIO_EXTERNAL_ENDPOINT:-localhost}
      MINIO_EXTERNAL_PORT: ${MINIO_EXTERNAL_PORT:-9000}
      APP_ENV: ${APP_ENV:-production}
      APP_SECRET_KEY: ${APP_SECRET_KEY}
      RULEPACK_PATH: /app/docs/05_rulepack_v1.yaml
      EMAIL_ENABLED: ${EMAIL_ENABLED:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-false}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Bank Diligence Platform}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@example.com}
      WEBHOOK_DELIVERY_ENABLED: ${WEBHOOK_DELIVERY_ENABLED:-true}
      WEBHOOK_TIMEOUT_SECONDS: ${WEBHOOK_TIMEOUT_SECONDS:-10}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: bank-diligence-frontend:prod
    restart: unless-stopped
    env_file: .env
    environment:
      API_INTERNAL_BASE_URL: ${API_INTERNAL_BASE_URL:-http://api:8000}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - app

volumes:
  db_data:
  minio_data:

networks:
  app:
    driver: bridge
