  # MODULE: Registration Act - P9
  # ============================================================

  - id: "REG_001"
    module: "Registration"
    severity: "High"
    is_hard_stop: true
    evaluator: "missing_evidence"
    description: "Missing registered title instrument where required"
    inputs:
      doc_types: ["registry_deed", "certified_copy"]
    logic:
      required_doc_types: ["registry_deed", "certified_copy"]
    outputs:
      title: "Missing Registered Title Instrument"
      exception: "No registered title instrument (registry_deed or certified_copy) found"
      cp: "Obtain certified copy of registered deed with registry number/date/sub-registrar details"
      evidence_required: "certified_copy OR registry_deed with registry_number, registry_date, sub_registrar"
      resolution_conditions: "Upload registered title instrument with complete registry details"

  - id: "REG_002"
    module: "Registration"
    severity: "High"
    evaluator: "mismatch"
    description: "Registry number/date mismatch across documents"
    inputs:
      dossier_keys: ["registry.registry_number", "registry.registry_date"]
    logic:
      compare_all: true
      field_pattern: "registry.registry_number"
      compare_dates: true
      field_pattern_date: "registry.registry_date"
    outputs:
      title: "Registry Number/Date Mismatch"
      exception: "Extracted registry number or date differs across documents (legal opinion vs deed vs ROD output)"
      cp: "Verify correct registry number/date via ROD evidence upload OR certified copy"
      evidence_required: "ROD_output OR certified_copy with verified registry_number and registry_date"
      resolution_conditions: "Reconcile registry details and upload verified evidence"

